name: Deploy Hugo Site to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build
        run: hugo --minify

      # NOTE: GITHUB_TOKEN doesn't have permission to push to gh-pages branch
      # Solution: Replace with a Personal Access Token (PAT) that has repo scope
      #
      # Steps to fix:
      # 1. Create a PAT at https://github.com/settings/tokens (repo scope)
      # 2. Add it as a repository secret: Settings > Secrets and variables > Actions > New Repository Secret
      #    Name: DEPLOY_TOKEN
      # 3. Uncomment the lines below and comment out the github_token line
      #
      # - name: Deploy to GitHub Pages
      #   uses: peaceiris/actions-gh-pages@v4
      #   with:
      #     personal_token: ${{ secrets.DEPLOY_TOKEN }}
      #     publish_dir: ./public

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
